<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机器人路线规划 - REEMAN集成版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #1e3a5f, #2d1b5e);
      color: white;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      flex: 1;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .lang-btn {
      padding: 4px 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }
    .lang-btn.active {
      background: rgba(255,255,255,0.4);
      border-color: white;
    }
    .main {
      display: grid;
      grid-template-columns: 170px 1fr 240px;
      gap: 8px;
      flex: 1;
      padding: 8px;
      overflow: hidden;
    }
    .sidebar {
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      padding: 8px;
    }
    .panel {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px;
      flex-shrink: 0;
    }
    .panel h3 {
      font-size: 12px;
      margin: 0 0 6px 0;
      color: #0ea5e9;
      font-weight: 600;
    }
    button {
      padding: 6px 10px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      width: 100%;
      margin-bottom: 4px;
    }
    button:hover { background: #0284c7; }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }
    input, select {
      padding: 4px 6px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 11px;
      width: 100%;
      margin-bottom: 4px;
    }
    .canvas-wrapper {
      background: #ffffff;
      border-radius: 8px;
      border: 2px solid #0ea5e9;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    canvas {
      display: block;
      cursor: crosshair;
      background: white;
    }
    .mode-btn {
      flex: 1;
      padding: 5px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
    }
    .mode-btn.active {
      background: #0ea5e9;
      color: white;
      border-color: #0ea5e9;
    }
    .stat-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 4px;
      text-align: center;
      font-size: 9px;
    }
    .stat-val {
      font-size: 12px;
      font-weight: 700;
      color: #0ea5e9;
    }
    .log-area {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 4px;
      font-size: 9px;
      font-family: monospace;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🛣️ 机器人路线规划 - REEMAN地图版</h1>
    <div class="header-right">
      <button class="lang-btn active" id="btnLangZh" onclick="setLanguage('zh')" style="width: auto;">中文</button>
      <button class="lang-btn" id="btnLangEn" onclick="setLanguage('en')" style="width: auto;">English</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <h3>模式</h3>
        <div style="display: flex; gap: 4px;">
          <button class="mode-btn active" onclick="switchMode('view')" style="flex: 1; padding: 5px;">查看</button>
          <button class="mode-btn" onclick="switchMode('point')" style="flex: 1; padding: 5px;">点编辑</button>
          <button class="mode-btn" onclick="switchMode('path')" style="flex: 1; padding: 5px;">路径</button>
        </div>
      </div>

      <div class="panel" id="pointPanel" style="display: none;">
        <h3>点编辑</h3>
        <select id="pointType" style="margin-bottom: 6px;">
          <option value="patrol">轮巡点(A,B,C...)</option>
          <option value="call">呼叫点(I,II,III...)</option>
          <option value="robot">机器人(1,2,3...)</option>
        </select>
        <button onclick="startAddPoint()">+ 新增点</button>
      </div>

      <div class="panel" id="pathPanel" style="display: none;">
        <h3>路径编辑</h3>
        <button onclick="startDrawPath()">✏️ 绘制路径</button>
        <button onclick="exportRoute()">💾 导出路线</button>
      </div>

      <div class="panel">
        <h3>日志</h3>
        <div class="log-area" id="logArea"></div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="mapCanvas"></canvas>
    </div>

    <div class="sidebar">
      <div class="panel">
        <h3>统计</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 6px;">
          <div class="stat-card">
            <div style="font-size: 8px;">机器人</div>
            <div class="stat-val" id="robotCount">0</div>
          </div>
          <div class="stat-card">
            <div style="font-size: 8px;">路径</div>
            <div class="stat-val" id="pathCount">0</div>
          </div>
        </div>
        <label style="font-size: 9px; display: block; margin-bottom: 2px;">机器人数量：</label>
        <input type="number" id="numRobots" min="1" max="20" value="3" onchange="updateRobotCount()">
      </div>

      <div class="panel">
        <h3>机器人状态</h3>
        <div id="robotStatusList" style="font-size: 10px; line-height: 1.6;"></div>
      </div>

      <div class="panel">
        <h3>控制</h3>
        <button onclick="startSimulation()" id="btnStart">▶️ 启动仿真</button>
        <button onclick="stopSimulation()" id="btnStop" disabled>⏹️ 停止</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentMode = 'view';
let mapData = null;
let keyPoints = JSON.parse(localStorage.getItem('keyPoints') || '{}');
let pathNetwork = JSON.parse(localStorage.getItem('pathNetwork') || '{}');
let robots = {};
let isRunning = false;

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let mapZoom = 1, mapPanX = 0, mapPanY = 0;

// 模式切换
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('pointPanel').style.display = mode === 'point' ? 'flex' : 'none';
  document.getElementById('pathPanel').style.display = mode === 'path' ? 'flex' : 'none';
  log(`[模式] ${mode}`);
  render();
}

// 初始化仿真地图
function initMap() {
  const W = 400, H = 300;
  const data = new Uint8Array(W * H);
  data.fill(0);

  // 边界
  for (let x = 0; x < W; x++) {
    data[0 * W + x] = 100;
    data[(H-1) * W + x] = 100;
  }
  for (let y = 0; y < H; y++) {
    data[y * W + 0] = 100;
    data[y * W + (W-1)] = 100;
  }

  // 模拟房间
  for (let x = 80; x < 120; x++) {
    for (let y = 50; y < 100; y++) {
      data[y * W + x] = 100;
    }
  }
  for (let x = 250; x < 290; x++) {
    for (let y = 100; y < 200; y++) {
      data[y * W + x] = 100;
    }
  }

  mapData = {
    width: W, height: H,
    resolution: 0.05,
    origin: {x: -10, y: -7.5},
    data: data
  };

  if (Object.keys(keyPoints).length === 0) {
    keyPoints = {
      'A': {x: -8, y: -5},
      'B': {x: 8, y: -5},
      'C': {x: 0, y: 5},
      '1': {x: -9, y: -6},
      '2': {x: 0, y: -6},
      '3': {x: 9, y: -6}
    };
    localStorage.setItem('keyPoints', JSON.stringify(keyPoints));
  }

  log('✅ 地图已初始化 (20m×15m, 占用栅格)');
}

// 坐标变换
function worldToCanvas(wx, wy) {
  const {width: W, height: H, resolution: res, origin} = mapData;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const cellW = cw / W, cellH = ch / H;

  const gx = (wx - origin.x) / res;
  const gy = H - (wy - origin.y) / res;

  const cx = gx * cellW * mapZoom - mapPanX;
  const cy = gy * cellH * mapZoom - mapPanY;

  return [Math.round(cx), Math.round(cy)];
}

function canvasToWorld(cx, cy) {
  const {width: W, height: H, resolution: res, origin} = mapData;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const cellW = cw / W, cellH = ch / H;

  const gx = (cx + mapPanX) / mapZoom / cellW;
  const gy = (cy + mapPanY) / mapZoom / cellH;

  const wx = gx * res + origin.x;
  const wy = (H - gy) * res + origin.y;

  return [wx, wy];
}

// 渲染地图栅格
function render() {
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  canvas.width = cw;
  canvas.height = ch;

  const {width: W, height: H, data} = mapData;
  const cellW = (cw / W) * mapZoom;
  const cellH = (ch / H) * mapZoom;

  // 绘制栅格数据（灰度图）
  const imgData = ctx.createImageData(W, H);
  const pix = imgData.data;
  for (let i = 0; i < W * H; i++) {
    const gray = 255 - Math.min(data[i] * 2.55, 255);
    pix[i*4+0] = gray;
    pix[i*4+1] = gray;
    pix[i*4+2] = gray;
    pix[i*4+3] = 255;
  }

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = W;
  tempCanvas.height = H;
  tempCanvas.getContext('2d').putImageData(imgData, 0, 0);
  ctx.drawImage(tempCanvas, 0, 0, W, H, -mapPanX, -mapPanY, W * cellW, H * cellH);

  // 网格
  ctx.strokeStyle = 'rgba(150, 150, 150, 0.2)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= W; i += 20) {
    const x = i * cellW - mapPanX;
    if (x >= 0 && x < cw) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, ch);
      ctx.stroke();
    }
  }

  // 路径
  ctx.strokeStyle = '#0ea5e9';
  ctx.lineWidth = 2;
  for (const path of Object.values(pathNetwork)) {
    if (path.length < 2) continue;
    ctx.beginPath();
    const [x0, y0] = worldToCanvas(path[0].x, path[0].y);
    ctx.moveTo(x0, y0);
    for (let i = 1; i < path.length; i++) {
      const [x, y] = worldToCanvas(path[i].x, path[i].y);
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // 点
  const colors = {patrol: '#10b981', call: '#8b5cf6', robot: '#ef4444'};
  for (const [label, pt] of Object.entries(keyPoints)) {
    const [cx, cy] = worldToCanvas(pt.x, pt.y);
    const type = isNaN(parseInt(label)) ? (label.match(/^[A-Z]/) ? 'patrol' : 'call') : 'robot';
    const color = colors[type];

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, cx, cy);
  }

  // 机器人
  for (const [id, r] of Object.entries(robots)) {
    const [cx, cy] = worldToCanvas(r.x, r.y);
    ctx.fillStyle = r.color;
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(id, cx, cy);
  }

  document.getElementById('pointCount').textContent = Object.keys(keyPoints).length;
  document.getElementById('pathCount').textContent = Object.keys(pathNetwork).length;
}

// 点编辑
function startAddPoint() {
  const type = document.getElementById('pointType').value;
  log(`点击地图新增${type}点...`);

  const handler = (e) => {
    const rect = canvas.getBoundingClientRect();
    const [wx, wy] = canvasToWorld(e.clientX - rect.left, e.clientY - rect.top);

    let label = '';
    if (type === 'patrol') {
      label = String.fromCharCode(65 + Object.keys(keyPoints).filter(l => /^[A-Z]/.test(l)).length);
    } else if (type === 'call') {
      const count = Object.keys(keyPoints).filter(l => /^[IVX]/.test(l)).length;
      label = ['I', 'II', 'III', 'IV', 'V', 'VI'][count] || 'X' + count;
    } else {
      label = String(Object.keys(keyPoints).filter(l => /^\d+$/.test(l)).length + 1);
    }

    keyPoints[label] = {x: parseFloat(wx.toFixed(2)), y: parseFloat(wy.toFixed(2))};
    localStorage.setItem('keyPoints', JSON.stringify(keyPoints));
    log(`✅ 点${label} @ (${wx.toFixed(2)}, ${wy.toFixed(2)})`);

    canvas.removeEventListener('click', handler);
    render();
  };

  canvas.addEventListener('click', handler);
}

// 路径绘制
let drawingPath = [];
function startDrawPath() {
  drawingPath = [];
  log('点击点相连路径，右键完成...');

  const clickHandler = (e) => {
    const rect = canvas.getBoundingClientRect();
    const [wx, wy] = canvasToWorld(e.clientX - rect.left, e.clientY - rect.top);

    let closest = null, minDist = 0.5;
    for (const [label, pt] of Object.entries(keyPoints)) {
      const d = Math.sqrt((pt.x - wx)**2 + (pt.y - wy)**2);
      if (d < minDist) { minDist = d; closest = label; }
    }

    if (closest) {
      drawingPath.push(closest);
      log(`路径: ${drawingPath.join(' → ')}`);
      render();
    }
  };

  const rightClickHandler = (e) => {
    e.preventDefault();
    if (drawingPath.length >= 2) {
      const key = drawingPath.join('-');
      pathNetwork[key] = drawingPath.map(l => keyPoints[l]);
      localStorage.setItem('pathNetwork', JSON.stringify(pathNetwork));
      log(`✅ 路径"${key}"已保存`);
    }
    drawingPath = [];
    canvas.removeEventListener('click', clickHandler);
    canvas.removeEventListener('contextmenu', rightClickHandler);
    render();
  };

  canvas.addEventListener('click', clickHandler);
  canvas.addEventListener('contextmenu', rightClickHandler);
}

// 机器人
function updateRobotCount() {
  const n = parseInt(document.getElementById('numRobots').value) || 3;
  robots = {};
  const colors = ['#ef4444', '#3b82f6', '#06b6d4', '#f59e0b', '#8b5cf6'];
  for (let i = 1; i <= n; i++) {
    robots[i] = {
      x: keyPoints[String(i)]?.x ?? -9 + (i-1)*2,
      y: keyPoints[String(i)]?.y ?? -6,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      color: colors[i % colors.length]
    };
  }
  document.getElementById('robotCount').textContent = n;
  updateRobotStatus();
  render();
}

function updateRobotStatus() {
  const html = Object.entries(robots)
    .map(([id, r]) => `<div>机器人${id}: (${r.x.toFixed(1)}, ${r.y.toFixed(1)})</div>`)
    .join('');
  document.getElementById('robotStatusList').innerHTML = html || '无';
}

// 仿真
function startSimulation() {
  isRunning = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  log('🎬 仿真运行中...');
  simulate();
}

function stopSimulation() {
  isRunning = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  log('⏹️ 仿真停止');
}

function simulate() {
  if (!isRunning) return;

  for (const r of Object.values(robots)) {
    r.x += r.vx;
    r.y += r.vy;
    r.x = Math.max(-9.8, Math.min(9.8, r.x));
    r.y = Math.max(-7.4, Math.min(7.4, r.y));

    if (Math.random() < 0.05) {
      r.vx = (Math.random() - 0.5) * 0.2;
      r.vy = (Math.random() - 0.5) * 0.2;
    }
  }

  updateRobotStatus();
  render();
  requestAnimationFrame(simulate);
}

// 导出
function exportRoute() {
  const data = {
    keyPoints, pathNetwork,
    mapInfo: { width: 20, height: 15, resolution: 0.05, origin: mapData.origin },
    timestamp: new Date().toISOString()
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'}));
  a.download = `route_${Date.now()}.json`;
  a.click();
  log('💾 路线已导出');
}

function setLanguage(lang) {
  document.getElementById('btnLangZh').classList.toggle('active', lang === 'zh');
  document.getElementById('btnLangEn').classList.toggle('active', lang === 'en');
}

function log(msg) {
  const area = document.getElementById('logArea');
  const line = document.createElement('div');
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
  if (area.children.length > 50) area.removeChild(area.firstChild);
}

// 初始化
window.addEventListener('load', () => {
  initMap();
  updateRobotCount();
  render();

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    mapZoom = Math.max(0.5, Math.min(5, mapZoom * (1 - e.deltaY * 0.001)));
    render();
  });

  let dragging = false, sx = 0, sy = 0;
  canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    sx = e.clientX;
    sy = e.clientY;
  });
  document.addEventListener('mousemove', (e) => {
    if (dragging) {
      mapPanX -= e.clientX - sx;
      mapPanY -= e.clientY - sy;
      sx = e.clientX;
      sy = e.clientY;
      render();
    }
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
  });

  log('系统就绪 (REEMAN地图仿真版)');
});
</script>

</body>
</html>
